# Netlify build + SPA config for the Summit 2026 PWA.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so React Router deep links resolve (also covered by public/_redirects).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache the service worker or the app shell HTML — always revalidate so a
# new deploy is picked up promptly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
