# Netlify build + SPA config for the Summit 2026 PWA.
[build]
  command = "npm run build"
  publish = "dist"

# Web Push backend: subscribe endpoint + scheduled sender (see files there).
[functions]
  directory = "netlify/functions"

# API routes to functions — must precede the SPA catch-all.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback so React Router deep links resolve (also covered by public/_redirects).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache the service worker or the app shell HTML — always revalidate so a
# new deploy is picked up promptly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# The push handler is importScripts'd by sw.js — never let it go stale.
[[headers]]
  for = "/push-sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# The live feed: phones re-fetch this; always revalidate at the edge.
[[headers]]
  for = "/announcements.json"
  [headers.values]
    Cache-Control = "no-cache"
